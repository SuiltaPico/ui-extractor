name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache infer-core Windows release
        uses: actions/cache@v4
        with:
          path: .infer-core-release
          key: infer-core-release-${{ github.ref_name }}-windows-${{ hashFiles('scripts/infer_core_release.ps1', 'scripts/download_infer_core_release.ps1') }}
          restore-keys: |
            infer-core-release-${{ github.ref_name }}-windows-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ui-extractor-windows-rust-1.95
          cache-all-targets: true

      - name: Download infer-core Windows release
        shell: pwsh
        run: ./scripts/download_infer_core_release.ps1 -Platform windows

      - name: Build Windows release packages
        shell: pwsh
        run: ./scripts/build_release_windows.ps1 -SkipDownload

      - uses: actions/upload-artifact@v6
        with:
          name: windows-packages
          path: dist/ui-extractor-windows-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache infer-core Android release
        uses: actions/cache@v4
        with:
          path: .infer-core-release
          key: infer-core-release-${{ github.ref_name }}-android-${{ hashFiles('scripts/infer_core_release.ps1', 'scripts/download_infer_core_release.ps1') }}
          restore-keys: |
            infer-core-release-${{ github.ref_name }}-android-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ui-extractor-android-rust-1.95
          cache-all-targets: true

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Cache cargo-ndk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-${{ runner.os }}-locked

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Download infer-core Android release
        shell: pwsh
        run: ./scripts/download_infer_core_release.ps1 -Platform android

      - name: Build Android release packages
        shell: pwsh
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./scripts/build_release_android.ps1 -SkipDownload

      - uses: actions/upload-artifact@v6
        with:
          name: android-packages
          path: dist/ui-extractor-android-*.zip

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*.zip
