name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Windows release packages
        shell: pwsh
        run: ./scripts/build_release_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/ui-extractor-*-windows-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Android release packages
        shell: pwsh
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./scripts/build_release_android.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: |
            dist/ui-extractor-*-android-*.zip

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip
