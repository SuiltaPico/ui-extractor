name: ui_extractor
description: Dart bindings for ui-extractor, a tool to extract UI element trees and text from screenshots.
version: 0.1.0
repository: https://github.com/SuiltaPico/ui-extractor
license: MIT

environment:
  sdk: ^3.4.0
  flutter: ">=3.16.0"

platforms:
  android:
  windows:

hooks:
  user_defines:
    ui_extractor:
      release_repo: SuiltaPico/ui-extractor
      release_tag: 0.1.0

dependencies:
  archive: ^4.0.0
  code_assets: ^1.2.1
  ffi: ^2.1.2
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  http: ^1.2.1
  local_infer_core:
    git:
      url: https://github.com/SuiltaPico/local-infer-core.git
      path: dart
      ref: v0.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  ffigen: ^11.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      windows:
        ffiPlugin: true
